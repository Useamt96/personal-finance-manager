<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>হিসাবের খাতা — Personal Finance Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@500;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --paper:#f7f7f9; --paper-dark:#edeef1; --ink:#20242c; --ink-soft:#7a8291;
    --rule-red:#e69500; --green:#1aa251; --green-bg:#e5f7ec; --maroon:#e0342c; --maroon-bg:#fdeaea;
    --gold:#f5b400; --gold-bg:#fff3d6; --line:#e8e9ed; --card:#ffffff; --shadow:0 4px 16px rgba(20,20,25,0.07);
    --accent-grad:linear-gradient(135deg,#ffcd3c,#f5a900);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(245,169,0,0.05), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(245,169,0,0.05), transparent 45%);
    font-family:'Hind Siliguri', sans-serif; color:var(--ink); min-height:100vh;
  }
  .app{ max-width:720px; margin:0 auto; position:relative; padding-bottom:36px;}
  header.top{
    padding:26px 20px 18px; display:flex; justify-content:space-between; align-items:center;
    background:var(--accent-grad); color:var(--ink); border-radius:0 0 22px 22px; box-shadow:var(--shadow);
    margin-bottom:16px;
  }
  header.top .brand{ display:flex; align-items:center; gap:10px;}
  header.top .brand-icon{ font-size:1.6rem; }
  header.top h1{ font-family:'Hind Siliguri', sans-serif; font-weight:800; font-size:1.3rem; margin:0; letter-spacing:.2px;}
  header.top p{ margin:2px 0 0; font-size:.78rem; opacity:.75;}
  .header-actions{ display:flex; gap:8px; align-items:center;}
  .icon-round{ background:rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.12); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--ink); cursor:pointer;}
  .logout-btn{ background:rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.12); border-radius:20px; padding:7px 14px; font-size:.75rem; color:var(--ink); cursor:pointer; font-weight:700;}
  .lang-toggle{ display:flex; background:rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.12); border-radius:20px; padding:3px; gap:2px;}
  .lang-toggle button{ border:none; background:transparent; color:var(--ink); font-size:.68rem; font-weight:700; padding:5px 9px; border-radius:16px; cursor:pointer; font-family:'Hind Siliguri',sans-serif; opacity:.7;}
  .lang-toggle button.active{ background:#fff; color:#c67e00; opacity:1;}
  .qa-btn-wrap{ position:relative; display:flex; width:100%; }
  .qa-btn-wrap .qa-btn{ flex:1; width:100%; }
  .qa-info-btn{ position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:#fff; border:1px solid var(--line); color:var(--ink-soft); font-size:.62rem; font-weight:800; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 1px 3px rgba(20,20,25,.12); z-index:2;}
  .modal-overlay{ position:fixed; inset:0; background:rgba(20,20,25,.5); display:flex; align-items:flex-end; justify-content:center; z-index:999;}
  .modal-overlay .modal-sheet{ background:var(--card); width:100%; max-width:720px; border-radius:18px 18px 0 0; padding:20px 18px 26px; max-height:82vh; overflow-y:auto; box-shadow:0 -6px 24px rgba(0,0,0,.2);}
  .modal-sheet h3{ font-family:'Hind Siliguri',sans-serif; font-weight:800; margin:0 0 12px; font-size:1.05rem; display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .modal-sheet .modal-close{ background:var(--paper); border:1px solid var(--line); border-radius:50%; width:30px; height:30px; font-size:.9rem; cursor:pointer; flex:0 0 auto;}
  .modal-sheet .modal-body{ font-size:.88rem; line-height:1.7; color:var(--ink);}
  .party-toggle-link{ background:none; border:none; color:var(--rule-red); font-size:.8rem; font-weight:700; cursor:pointer; padding:6px 0; text-align:left;}
  .tabs{ display:flex; gap:8px; padding:0 14px 14px; overflow-x:auto; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{ flex:0 0 auto; font-family:'Hind Siliguri',sans-serif; font-weight:600; font-size:.82rem; padding:10px 16px; background:var(--card); border:1px solid var(--line); border-radius:24px; color:var(--ink-soft); cursor:pointer; transition:.15s; display:flex; align-items:center; gap:6px; box-shadow:0 1px 3px rgba(20,20,25,.04);}
  .tab-btn.active{ background:var(--gold); color:var(--ink); border-color:transparent; font-weight:800; box-shadow:0 3px 10px rgba(245,180,0,.35);}
  main{ background:var(--card); margin:0 14px; border-radius:18px; box-shadow:var(--shadow); border:1px solid var(--line); padding:20px 18px 26px; min-height:55vh;}
  h2.section-title{ font-family:'Hind Siliguri', sans-serif; font-weight:800; font-size:1.1rem; margin:0 0 16px; padding-bottom:10px; border-bottom:2px solid var(--line); color:var(--ink); display:flex; align-items:center; gap:8px;}
  h3.sub-title{ font-family:'Hind Siliguri', sans-serif; font-weight:700; font-size:.92rem; margin:20px 0 10px; color:var(--ink-soft);}
  .cards-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;}
  .stat-card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; position:relative; overflow:hidden;}
  .stat-card .label{ font-size:.72rem; color:var(--ink-soft); margin-bottom:5px; font-weight:600;}
  .stat-card .value{ font-family:'Hind Siliguri',sans-serif; font-size:1.2rem; font-weight:800; color:var(--ink);}
  .stat-card.pos .value{ color:var(--green);} .stat-card.neg .value{ color:var(--maroon);} .stat-card.gold .value{ color:#c67e00;}
  .stat-card.gold{ background:var(--gold-bg); border-color:#f3dfa0;}
  .cards-grid.compact{ gap:8px; margin-bottom:14px;}
  .cards-grid.compact .stat-card{ padding:8px 10px;}
  .cards-grid.compact .stat-card .label{ font-size:.62rem; margin-bottom:2px;}
  .cards-grid.compact .stat-card .value{ font-size:.9rem;}
  .statement-box{ background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:18px;}
  .statement-box .filter-bar{ display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:12px;}
  .statement-box .filter-bar .date-row{ display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .statement-summary{ display:flex; justify-content:space-between; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px; font-size:.78rem;}
  .statement-summary .amt-big{ font-family:'Hind Siliguri',sans-serif; font-weight:800; font-weight:700; font-size:1rem;}
  .chart-box{ background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:20px;}
  .chart-box canvas{ max-height:220px;}
  form.entry-form{ display:grid; gap:12px; background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:20px;}
  form.entry-form .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  label{ font-size:.75rem; color:var(--ink-soft); display:block; margin-bottom:4px; font-weight:600;}
  input, select, textarea{ width:100%; font-family:'Hind Siliguri',sans-serif; font-size:.92rem; padding:10px 12px; border:1px solid var(--line); border-radius:9px; background:#fff; color:var(--ink); transition:.15s;}
  input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--rule-red); box-shadow:0 0 0 3px rgba(230,149,0,0.15);}
  textarea{ resize:vertical; min-height:40px;}
  .btn{ font-family:'Hind Siliguri',sans-serif; font-weight:700; font-size:.92rem; padding:12px 18px; border-radius:11px; border:none; cursor:pointer; transition:.15s;}
  .btn-primary{ background:var(--accent-grad); color:var(--ink); box-shadow:0 3px 10px rgba(245,169,0,.3);}
  .btn-primary:active{ transform:scale(.98);}
  .btn-outline{ background:transparent; border:1px solid var(--line); color:var(--ink-soft);}
  .btn-block{ width:100%; }
  .type-scroll{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;}
  .type-scroll::-webkit-scrollbar{display:none;}
  .type-chip{ flex:0 0 auto; padding:9px 15px; border-radius:22px; border:1px solid var(--line); background:#fff; font-size:.8rem; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap;}
  .type-chip.active{ background:var(--accent-grad); color:#fff; border-color:transparent;}
  .entry-list{ display:grid; gap:10px;}
  .entry{ background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:12px 14px; display:flex; justify-content:space-between; align-items:center; gap:8px; transition:.15s;}
  .entry:active{ transform:scale(.99);}
  .entry .meta{ font-size:.72rem; color:var(--ink-soft); margin-top:2px;}
  .entry .name{ font-weight:700; font-size:.92rem;}
  .entry .amt{ font-family:'Hind Siliguri',sans-serif; font-weight:800; font-weight:700; font-size:1.02rem; white-space:nowrap;}
  .amt.pos{ color:var(--green);} .amt.neg{ color:var(--maroon);}
  .icon-btn{ background:none; border:none; cursor:pointer; font-size:1.05rem; color:var(--ink-soft); padding:5px;}
  .badge{ font-size:.62rem; padding:3px 9px; border-radius:20px; font-weight:700; display:inline-block; margin-top:4px;}
  .badge.receivable, .badge.income, .badge.sale{ background:var(--green-bg); color:var(--green);}
  .badge.payable, .badge.expense, .badge.purchase{ background:var(--maroon-bg); color:var(--maroon);}
  .badge.transfer, .badge.receive_due, .badge.pay_due{ background:var(--gold-bg); color:var(--gold);}
  .empty-state{ text-align:center; padding:36px 10px; color:var(--ink-soft); font-size:.9rem;}
  .loading{ text-align:center; padding:20px; color:var(--ink-soft); font-size:.85rem;}
  .save-status{ position:fixed; top:14px; right:14px; background:var(--accent-grad); color:#fff; padding:8px 16px; border-radius:20px; font-size:.75rem; opacity:0; transition:.3s; z-index:50; box-shadow:var(--shadow);}
  .save-status.show{ opacity:1;}
  ::placeholder{ color:#b8ac96;}
  /* Auth screen */
  .auth-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(circle at 20% 10%, rgba(245,169,0,.08), transparent 45%), var(--paper);}
  .auth-card{ background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:32px 24px; width:100%; max-width:380px;}
  .auth-card h1{ font-family:'Hind Siliguri',sans-serif; font-weight:800; text-align:center; margin:0 0 4px; font-size:1.7rem; color:#c67e00;}
  .auth-card p.sub{ text-align:center; color:var(--ink-soft); font-size:.85rem; margin:0 0 22px;}
  .auth-toggle{ display:flex; gap:8px; margin-bottom:18px; background:var(--paper); padding:4px; border-radius:12px;}
  .auth-toggle button{ flex:1; padding:9px; border-radius:9px; border:none; background:transparent; font-weight:700; font-size:.85rem; color:var(--ink-soft); cursor:pointer;}
  .auth-toggle button.active{ background:var(--card); color:var(--ink); box-shadow:0 1px 4px rgba(20,20,25,.1);}
  .auth-error{ color:var(--maroon); font-size:.8rem; margin-top:4px; min-height:1em;}
  .auth-note{ font-size:.75rem; color:var(--ink-soft); text-align:center; margin-top:14px;}
  select[multiple]{ height:auto; }
  .filter-bar{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .filter-bar select, .filter-bar input{ width:auto; flex:1; min-width:110px;}
  /* Quick-add grid */
  .qa-card{ background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:20px; display:grid; gap:12px;}
  .qa-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;}
  .qa-btn{ padding:16px 8px; border-radius:12px; border:none; font-weight:700; font-size:.92rem; cursor:pointer; font-family:'Hind Siliguri',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px; transition:.15s;}
  .qa-btn.green{ background:var(--green-bg); color:var(--green);}
  .qa-btn.red{ background:var(--maroon-bg); color:var(--maroon);}
  .qa-btn:active{ transform:scale(0.96);}
  .checkbox-row{ display:flex; align-items:center; gap:7px; font-size:.8rem; color:var(--ink-soft);}
  .checkbox-row input{ width:auto;}
  /* Contact ledger */
  .ledger-header{ background:var(--accent-grad); color:var(--ink); border-radius:14px; padding:16px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow);}
  .ledger-header .name{ font-family:'Hind Siliguri',sans-serif; font-weight:800; font-size:1.1rem; font-weight:700;}
  .ledger-header .net{ text-align:right;}
  .ledger-header .net .amt-big{ font-family:'Hind Siliguri',sans-serif; font-weight:800; font-size:1.3rem; font-weight:700;}
  .ledger-header .net .lbl{ font-size:.7rem; opacity:.85;}
  .back-btn{ background:none; border:none; color:var(--ink-soft); font-size:.9rem; font-weight:600; cursor:pointer; padding:0 0 12px 0; display:block;}
  .ledger-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; padding:11px 8px; border-bottom:1px solid var(--line); align-items:center;}
  .ledger-row .ld-date{ font-size:.72rem; color:var(--ink-soft);}
  .ledger-row .ld-type{ font-size:.74rem; font-weight:700; margin-top:2px;}
  .ledger-row .ld-dr{ text-align:center; font-weight:700; color:var(--maroon); font-size:.9rem;}
  .ledger-row .ld-cr{ text-align:center; font-weight:700; color:var(--green); font-size:.9rem;}
  .ledger-col-heads{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; padding:0 8px 8px; font-size:.68rem; color:var(--ink-soft); font-weight:700; border-bottom:2px solid var(--line); text-transform:uppercase; letter-spacing:.3px;}
  .ledger-actions{ display:flex; gap:10px; margin-top:18px; position:sticky; bottom:8px;}
  .ledger-actions .btn{ flex:1; padding:14px 8px; border-radius:12px; font-size:.92rem;}
  .btn-give{ background:var(--maroon-bg); color:var(--maroon);}
  .btn-receive{ background:var(--green-bg); color:var(--green);}
  /* PIN lock screen */
  .pin-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(circle at 20% 10%, rgba(245,169,0,.08), transparent 45%), var(--paper);}
  .pin-card{ background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:32px 24px; width:100%; max-width:340px; text-align:center;}
  .pin-card .lock-icon{ font-size:2.2rem; margin-bottom:6px;}
  .pin-card h2{ font-family:'Hind Siliguri',sans-serif; font-weight:800; margin:0 0 4px; font-size:1.3rem;}
  .pin-card p{ color:var(--ink-soft); font-size:.82rem; margin:0 0 20px;}
  .pin-dots{ display:flex; justify-content:center; gap:14px; margin-bottom:22px;}
  .pin-dot{ width:16px; height:16px; border-radius:50%; border:2px solid var(--line); background:transparent;}
  .pin-dot.filled{ background:var(--rule-red); border-color:var(--rule-red);}
  .pin-keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .pin-key{ padding:16px 0; border-radius:12px; border:1px solid var(--line); background:var(--paper); font-size:1.15rem; font-weight:700; color:var(--ink); cursor:pointer;}
  .pin-key:active{ background:var(--paper-dark);}
  .pin-key.wide{ font-size:.85rem; color:var(--ink-soft);}
  .pin-error{ color:var(--maroon); font-size:.78rem; min-height:1.2em; margin-bottom:8px;}
  .contact-box{ background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:16px;}
  .contact-row{ display:flex; align-items:center; gap:10px; padding:8px 0; text-decoration:none; color:var(--ink); font-size:.88rem; font-weight:600;}
  .contact-row .icon{ font-size:1.1rem;}
  .contact-note{ font-size:.8rem; color:var(--ink-soft); line-height:1.6; margin-top:8px; white-space:pre-wrap;}
  /* Blog */
  .blog-card{ background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; cursor:pointer; transition:.15s;}
  .blog-card:active{ transform:scale(.99);}
  .blog-card .blog-title{ font-family:'Hind Siliguri',sans-serif; font-weight:800; font-size:1.08rem; font-weight:700; margin-bottom:6px; line-height:1.4;}
  .blog-card .blog-meta{ font-size:.72rem; color:var(--ink-soft); margin-bottom:8px;}
  .blog-card .blog-snippet{ font-size:.85rem; color:var(--ink-soft); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .blog-detail-title{ font-family:'Hind Siliguri',sans-serif; font-weight:800; font-size:1.4rem; font-weight:700; line-height:1.4; margin:4px 0 8px;}
  .blog-detail-meta{ font-size:.78rem; color:var(--ink-soft); margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid var(--line);}
  .blog-detail-content{ font-size:.98rem; line-height:1.9; white-space:pre-wrap; color:var(--ink);}
  .blog-locked{ text-align:center; padding:30px 16px; background:var(--paper); border:1px dashed var(--line); border-radius:14px; color:var(--ink-soft); font-size:.85rem;}
  /* Settings panel */
  .settings-overlay{ position:fixed; inset:0; background:rgba(20,20,25,0.45); z-index:100; display:flex; align-items:flex-end; justify-content:center;}
  .settings-sheet{ background:var(--card); width:100%; max-width:480px; border-radius:20px 20px 0 0; padding:22px 20px 28px; box-shadow:0 -6px 24px rgba(0,0,0,.2); max-height:85vh; overflow-y:auto;}
  .settings-sheet h2{ font-family:'Hind Siliguri',sans-serif; font-weight:800; margin:0 0 16px; font-size:1.15rem;}
  .settings-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--line);}
  .switch{ position:relative; width:44px; height:24px;}
  .switch input{ opacity:0; width:0; height:0;}
  .switch .slider{ position:absolute; inset:0; background:var(--line); border-radius:24px; cursor:pointer; transition:.2s;}
  .switch .slider::before{ content:""; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s;}
  .switch input:checked + .slider{ background:var(--green);}
  .switch input:checked + .slider::before{ transform:translateX(20px);}
</style>

</head>
<body>

<div id="authScreen" class="auth-wrap" style="display:none;">
  <div class="auth-card">
    <h1>হিসাবের খাতা</h1>
    <p class="sub">ব্যক্তিগত ও ব্যবসায়িক হিসাব — এক জায়গায়</p>
    <div class="auth-toggle">
      <button id="loginTabBtn" class="active">লগইন</button>
      <button id="signupTabBtn">সাইন আপ</button>
    </div>
    <form id="authForm" class="entry-form" style="margin-bottom:0;">
      <div id="fullNameField" style="display:none;">
        <label>পুরো নাম</label>
        <input type="text" name="full_name" placeholder="আপনার নাম">
      </div>
      <div>
        <label>ইমেইল</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div>
        <label>পাসওয়ার্ড</label>
        <input type="password" name="password" required minlength="6" placeholder="কমপক্ষে ৬ ক্যারেক্টার">
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="authSubmitBtn">লগইন করুন</button>
      <div class="auth-error" id="authError"></div>
    </form>
    <p class="auth-note" id="authNote"></p>
  </div>
</div>

<div id="expiredScreen" class="pin-wrap" style="display:none;">
  <div class="pin-card" style="max-width:380px; text-align:left;">
    <div class="lock-icon" style="text-align:center;">⏳</div>
    <h2 style="text-align:center;">মেয়াদ শেষ হয়ে গেছে</h2>
    <p style="text-align:center;">আপনার ট্রায়াল বা সাবস্ক্রিপশনের মেয়াদ শেষ হয়ে গেছে।</p>
    <div id="expiredContactBox"></div>
    <button class="btn btn-outline btn-block" id="expiredLogoutBtn" style="margin-top:16px;">লগআউট করুন</button>
  </div>
</div>

<div id="pinScreen" class="pin-wrap" style="display:none;">
  <div class="pin-card">
    <div class="lock-icon">🔒</div>
    <h2>পিন দিন</h2>
    <p>আপনার হিসাবের খাতা আনলক করতে পিন দিন</p>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-keypad" id="pinKeypad"></div>
  </div>
</div>

<div id="settingsOverlay" class="settings-overlay" style="display:none;">
  <div class="settings-sheet">
    <h2>সেটিংস</h2>

function showInfoModal(title, bodyHtml){
  document.querySelectorAll('.modal-overlay').forEach(m=>m.remove());
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-sheet"><h3><span>${title}</span><button type="button" class="modal-close">✕</button></h3><div class="modal-body">${bodyHtml}</div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('.modal-close').addEventListener('click', ()=> overlay.remove());
}

let authMode = 'login';
document.getElementById('loginTabBtn').addEventListener('click', ()=>setAuthMode('login'));

function setAuthMode(mode){
  authMode = mode;
  document.getElementById('loginTabBtn').classList.toggle('active', mode==='login');
  document.getElementById('signupTabBtn').classList.toggle('active', mode==='signup');
  document.getElementById('fullNameField').style.display = mode==='signup' ? 'block':'none';
  document.getElementById('authSubmitBtn').textContent = mode==='signup' ? 'অ্যাকাউন্ট তৈরি করুন' : 'লগইন করুন';
  document.getElementById('authError').textContent='';
  document.getElementById('authNote').textContent='';
}
document.getElementById('authForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const email = fd.get('email'), password = fd.get('password');
  const errEl = document.getElementById('authError');
  const noteEl = document.getElementById('authNote');
  errEl.textContent=''; noteEl.textContent='';
  document.getElementById('authSubmitBtn').textContent = 'অপেক্ষা করুন...';
  try{
    if(authMode==='signup'){
      const { data, error } = await sb.auth.signUp({ email, password, options:{ data:{ full_name: fd.get('full_name')||'' } } });
      if(error) throw error;
      if(data.user && !data.session){
        noteEl.textContent = 'ইমেইলে পাঠানো লিংকে ক্লিক করে অ্যাকাউন্ট ভেরিফাই করুন, তারপর লগইন করুন।';
        setAuthMode('login');
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw error;
    }
  } catch(err){
    errEl.textContent = err.message || 'কিছু ভুল হয়েছে, আবার চেষ্টা করুন।';
  }
  document.getElementById('authSubmitBtn').textContent = authMode==='signup' ? 'অ্যাকাউন্ট তৈরি করুন' : 'লগইন করুন';
});
async function doLogout(){
  try{ await sb.auth.signOut(); } catch(e){ console.error(e); }
  // Force UI switch regardless, in case the auth-state event is delayed or blocked
  state.user = null; state.loaded = false; state.pinUnlocked = false; state.settings = null; state.profile = null;
  state.blogPosts = []; state.blogLoaded = false; state.blogPostDetailId = null; state.editingBlogPostId = null;

  document.getElementById('expiredScreen').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('authForm').reset();
  setAuthMode('login');
}
document.getElementById('logoutBtn').addEventListener('click', async ()=>{

  await doLogout();
  document.getElementById('logoutBtn').textContent = t('logout');
});

sb.auth.onAuthStateChange((event, session)=>{

async function bootApp(){
  renderTabs(); renderMain();
  await ensureDefaults();
  await loadAll();
  touchLastActive();
  const emailLabel = document.getElementById('userEmailLabel');
  emailLabel.textContent = state.user.email + (state.profile && state.profile.is_admin ? ' 👑 (Admin)' : '');
  renderTabs(); renderMain();
  if(isAccessExpired()){
    showExpiredScreen();
  } else {
    checkPinLock();
  }
}
function touchLastActive(){
  // fire-and-forget; silently ignore if the last_active_at column hasn't been added yet
  sb.from('profiles').update({ last_active_at: new Date().toISOString() }).eq('id', state.user.id).then(()=>{}).catch(()=>{});
}

function isAccessExpired(){
  if(!state.profile) return false;
  if(state.profile.is_admin) return false;
  if(!state.profile.access_expires_at) return false;
  return new Date(state.profile.access_expires_at).getTime() < Date.now();
}

    await sb.from('accounts').insert({ user_id: state.user.id, account_name:'ক্যাশ', account_type:'cash', opening_balance:0, current_balance:0, is_default:true });
  }
  const { data: cats } = await sb.from('categories').select('id').limit(1);
  if(!cats || cats.length===0){
    const defaults = [
      {category_name:'বেতন', category_type:'income'}, {category_name:'ব্যবসা আয়', category_type:'income'}, {category_name:'অন্যান্য আয়', category_type:'income'},
      {category_name:'খাবার', category_type:'expense'}, {category_name:'যাতায়াত', category_type:'expense'}, {category_name:'বাসাভাড়া', category_type:'expense'}, {category_name:'বিল/ইউটিলিটি', category_type:'expense'}, {category_name:'অন্যান্য ব্যয়', category_type:'expense'},
      {category_name:'পণ্য/কাঁচামাল ক্রয়', category_type:'purchase'}, {category_name:'অন্যান্য ক্রয়', category_type:'purchase'},
      {category_name:'পণ্য বিক্রয়', category_type:'sale'}, {category_name:'অন্যান্য বিক্রয়', category_type:'sale'},
    ].map(c=>({...c, user_id: state.user.id}));
    await sb.from('categories').insert(defaults);
  }

async function loadAll(){
  const uid = state.user.id;
  const [a,c,ct,p,t,s,tr,pr,ac] = await Promise.all([
    sb.from('accounts').select('*').eq('user_id',uid).order('created_at'),
    sb.from('categories').select('*').eq('user_id',uid).order('category_type'),
    sb.from('contacts').select('*').eq('user_id',uid).order('contact_name'),
    sb.from('products').select('*').eq('user_id',uid).order('product_name'),
    sb.from('transactions').select('*, transaction_items(*)').eq('user_id',uid).is('deleted_at', null).order('transaction_date',{ascending:false}),
    sb.from('settings').select('*').eq('user_id',uid).maybeSingle(),
    sb.from('transactions').select('*, transaction_items(*)').eq('user_id',uid).not('deleted_at','is',null).order('deleted_at',{ascending:false}),
    sb.from('profiles').select('*').eq('id',uid).maybeSingle(),
    sb.from('app_config').select('*').eq('id',1).maybeSingle(),
  ]);
  state.accounts=a.data||[]; state.categories=c.data||[]; state.contacts=ct.data||[]; state.products=p.data||[]; state.transactions=t.data||[];
  state.trash = tr.data||[];
  state.settings = s.data || null;
  state.profile = pr.data || null;
  state.profileError = pr.error || null;
  state.appConfig = ac.data || null;
  if(!state.settings){
    const { data: ns } = await sb.from('settings').insert({ user_id: uid }).select().maybeSingle();
    state.settings = ns;
  }
  await purgeOldTrash();
  state.loaded=true;
}

async function purgeOldTrash(){
  const cutoff = Date.now() - 30*24*60*60*1000;
  const toPurge = state.trash.filter(t=> t.deleted_at && new Date(t.deleted_at).getTime() < cutoff);
  for(const t of toPurge){
    await sb.from('transaction_items').delete().eq('transaction_id', t.id);
    await sb.from('transactions').delete().eq('id', t.id);
  }
  if(toPurge.length){
    const purgedIds = new Set(toPurge.map(t=>t.id));
    state.trash = state.trash.filter(t=> !purgedIds.has(t.id));
  }
}

let pinEntry = '';
function checkPinLock(){
  if(state.settings && state.settings.pin_enabled && state.settings.pin_code && !state.pinUnlocked){
    document.getElementById('mainApp').style.display='none';
    document.getElementById('pinScreen').style.display='flex';
    pinEntry='';
    renderPinKeypad();
  } else {
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
  }
}
function renderPinKeypad(){
  document.getElementById('pinError').textContent='';
  document.getElementById('pinDots').innerHTML = [0,1,2,3].map(i=>`<div class="pin-dot ${i<pinEntry.length?'filled':''}"></div>`).join('');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  const kp = document.getElementById('pinKeypad');
  kp.innerHTML = keys.map(k=> k==='' ? `<div></div>` : `<button type="button" class="pin-key ${k==='⌫'?'wide':''}" data-key="${k}">${k}</button>`).join('');
  kp.querySelectorAll('.pin-key').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const k = btn.dataset.key;
      if(k==='⌫'){ pinEntry = pinEntry.slice(0,-1); }
      else if(pinEntry.length<4){ pinEntry += k; }
      document.getElementById('pinDots').innerHTML = [0,1,2,3].map(i=>`<div class="pin-dot ${i<pinEntry.length?'filled':''}"></div>`).join('');
      if(pinEntry.length===4){
        if(pinEntry === state.settings.pin_code){
          state.pinUnlocked = true; checkPinLock();
        } else {
          document.getElementById('pinError').textContent = 'ভুল পিন, আবার চেষ্টা করুন';
          pinEntry=''; setTimeout(()=>{ document.getElementById('pinDots').innerHTML = [0,1,2,3].map(()=>`<div class="pin-dot"></div>`).join(''); }, 400);
        }
      }
    });
  });
}

// ================= BALANCE CALC =================
function accountBalance(accId){
  const acc = state.accounts.find(a=>a.id===accId);
  if(!acc) return 0;
  let bal = Number(acc.opening_balance)||0;
  state.transactions.forEach(t=>{
    const total=Number(t.total_amount)||0, paid = t.paid_amount!=null?Number(t.paid_amount):total;
    if(t.transaction_type==='transfer'){
      if(t.from_account_id===accId) bal -= total;
      if(t.to_account_id===accId) bal += total;
      return;
    }
    if(t.account_id!==accId) return;
    if(t.transaction_type==='income') bal += total;
    else if(t.transaction_type==='expense') bal -= total;
    else if(t.transaction_type==='sale') bal += paid;
    else if(t.transaction_type==='purchase') bal -= paid;
    else if(t.transaction_type==='receivable') bal -= total;
    else if(t.transaction_type==='payable') bal += total;
    else if(t.transaction_type==='receive_due') bal += total;
    else if(t.transaction_type==='pay_due') bal -= total;
    else if(t.transaction_type==='opening_balance') bal += total;
  });
  return bal;
}
function contactBalance(contactId){
  const c = state.contacts.find(x=>x.id===contactId);
  let bal = c ? (Number(c.opening_balance)||0) : 0;
  state.transactions.filter(t=>t.contact_id===contactId).forEach(t=>{
    const total=Number(t.total_amount)||0, due = t.due_amount!=null?Number(t.due_amount):0;
    if(t.transaction_type==='sale') bal += due;
    else if(t.transaction_type==='purchase') bal -= due;
    else if(t.transaction_type==='receivable') bal += total;
    else if(t.transaction_type==='payable') bal -= total;
    else if(t.transaction_type==='receive_due') bal -= total;
    else if(t.transaction_type==='pay_due') bal += total;
  });
  return bal; // positive = they owe me (receivable), negative = I owe them (payable)
}
function productStock(prodId){
  const p = state.products.find(x=>x.id===prodId);
  let stock = p ? (Number(p.opening_stock)||0) : 0;
  state.transactions.forEach(t=>{
    (t.transaction_items||[]).forEach(it=>{
      if(it.product_id!==prodId) return;
      const q = Number(it.quantity)||0;
      if(t.transaction_type==='purchase') stock += q;
      else if(t.transaction_type==='sale') stock -= q;
    });
  });
  return stock;
}

// ================= STATEMENT (dashboard: account / contact ledger by date range) =================
function txnSortKey(t){ return new Date(t.transaction_date+'T'+(t.created_at?t.created_at.slice(11,19):'00:00:00')).getTime(); }

function accountTxnEffect(t, accId){
  const total = Number(t.total_amount)||0, paid = t.paid_amount!=null?Number(t.paid_amount):total;
  if(t.transaction_type==='transfer'){
    if(t.from_account_id===accId) return -total;
    if(t.to_account_id===accId) return total;
    return 0;
  }
  if(t.account_id!==accId) return 0;
  switch(t.transaction_type){
    case 'income': return total;
    case 'expense': return -total;
    case 'sale': return paid;
    case 'purchase': return -paid;
    case 'receivable': return -total;
    case 'payable': return total;
    case 'receive_due': return total;
    case 'pay_due': return -total;
    case 'opening_balance': return total;
    default: return 0;
  }
}

function contactTxnEffect(t){
  const total = Number(t.total_amount)||0, due = t.due_amount!=null?Number(t.due_amount):0;
  let dr=0, cr=0;
  if(t.transaction_type==='sale') dr=due;
  else if(t.transaction_type==='purchase') cr=due;
  else if(t.transaction_type==='receivable') dr=total;
  else if(t.transaction_type==='payable') cr=total;
  else if(t.transaction_type==='receive_due') cr=total;
  else if(t.transaction_type==='pay_due') dr=total;
  return { dr, cr };
}

function renderStatementHtml(kind, id, from, to){
  const isAcc = kind==='acc';
  const subject = isAcc ? state.accounts.find(a=>a.id===id) : state.contacts.find(c=>c.id===id);
  if(!subject) return `<div class="empty-state">${t('stmt_not_found')}</div>`;

  let all = isAcc
    ? state.transactions.filter(t=> t.account_id===id || (t.transaction_type==='transfer' && (t.from_account_id===id || t.to_account_id===id)))
    : state.transactions.filter(t=> t.contact_id===id);
  if(to) all = all.filter(t=> t.transaction_date <= to);
  all = all.slice().sort((a,b)=> txnSortKey(a)-txnSortKey(b));

  let running = Number(subject.opening_balance)||0;
  const rows = [];
  all.forEach(t=>{
    let dr=0, cr=0;
    if(isAcc){ const eff = accountTxnEffect(t, id); if(eff>=0) dr=eff; else cr=-eff; }
    else { const e = contactTxnEffect(t); dr=e.dr; cr=e.cr; }
    running += dr - cr;
    rows.push({ t, dr, cr, bal: running });
  });

  const opening = from ? (rows.filter(r=>r.t.transaction_date < from).slice(-1)[0]?.bal ?? (Number(subject.opening_balance)||0)) : (Number(subject.opening_balance)||0);
  const visibleRows = (from ? rows.filter(r=>r.t.transaction_date >= from) : rows).slice().reverse();
  const closing = rows.length ? rows[rows.length-1].bal : opening;

  const drLabel = isAcc ? t('stmt_dr_acc') : t('stmt_dr_con');
  const crLabel = isAcc ? t('stmt_cr_acc') : t('stmt_cr_con');
  const name = isAcc ? subject.account_name : subject.contact_name;
  const closingLabel = isAcc ? (closing>=0?t('stmt_pos_balance'):t('stmt_neg_balance')) : (closing>=0?t('stmt_you_get'):t('stmt_you_owe'));

  return `
    <div class="statement-summary">
      <div><div style="font-weight:700;">${name}</div><div style="opacity:.75;">${t('stmt_opening')}: ${fmt(Math.abs(opening))}</div></div>
      <div style="text-align:right;"><div class="amt-big ${closing>=0?'':'neg'}" style="color:${closing>=0?'var(--green)':'var(--maroon)'};">${fmt(Math.abs(closing))}</div><div style="opacity:.75;">${closingLabel}</div></div>
    </div>
    <div class="ledger-col-heads"><div>${state.lang==='en'?'Details':'বিবরণ'}</div><div style="text-align:center;">${drLabel}</div><div style="text-align:center;">${crLabel}</div></div>
    <div>
      ${visibleRows.length ? visibleRows.map(r=>`
        <div class="ledger-row">
          <div><div class="ld-date">${r.t.transaction_date}</div><div class="ld-type">${TXN_TYPE_LABEL[r.t.transaction_type]||r.t.transaction_type}${r.t.notes?' · '+r.t.notes:''}</div></div>
          <div class="ld-dr">${r.dr? fmt(r.dr):'—'}</div>
          <div class="ld-cr">${r.cr? fmt(r.cr):'—'}</div>
        </div>
        <div style="text-align:right; font-size:.68rem; color:var(--ink-soft); padding:0 6px 8px;">${t('stmt_balance_label')}: ${fmt(Math.abs(r.bal))}</div>
      `).join('') : `<div class="empty-state">${t('stmt_no_entries')}</div>`}
    </div>
  `;
}

// ================= DASHBOARD =================
function renderDashboard(el){
  const now = new Date(); const curMonth = now.toISOString().slice(0,7);
  let trialBanner = '';
  if(state.profile && !state.profile.is_admin && state.profile.access_expires_at){
    const daysLeft = Math.ceil((new Date(state.profile.access_expires_at).getTime()-Date.now())/(24*60*60*1000));
    if(daysLeft <= 7){
      const cfg = state.appConfig;
      const hint = cfg && cfg.contact_phone ? ` · নবায়নে কল করুন: ${cfg.contact_phone}` : '';
      trialBanner = `<div class="stat-card neg" style="margin-bottom:16px;"><div class="label">⏳ মেয়াদ</div><div class="value" style="font-size:.95rem;">আপনার মেয়াদ ${daysLeft>0?daysLeft+' দিন পর':'আজ'} শেষ হবে${hint}</div></div>`;
    }
  }
  const monthTx = state.transactions.filter(t=>t.transaction_date && t.transaction_date.startsWith(curMonth));
  const sum = (type)=> monthTx.filter(t=>t.transaction_type===type).reduce((s,t)=>s+Number(t.total_amount),0);
  const income=sum('income'), expense=sum('expense'), sale=sum('sale'), purchase=sum('purchase');

  const totalReceivable = state.contacts.reduce((s,c)=>{ const b=contactBalance(c.id); return s + (b>0?b:0); },0);
  const totalPayable = state.contacts.reduce((s,c)=>{ const b=contactBalance(c.id); return s + (b<0?-b:0); },0);
  const totalCash = state.accounts.filter(a=>a.is_active!==false).reduce((s,a)=>s+accountBalance(a.id),0);
  const visibleAccounts = state.accounts.filter(a=>a.is_active!==false).filter(a=>{
    const bal = accountBalance(a.id);
    return bal !== 0 || a.account_type==='cash';
  });
  const lowStock = state.products.filter(p=> productStock(p.id) <= (Number(p.minimum_stock)||0) && Number(p.minimum_stock)>0);

  const stmtDefaultTo = todayStr();
  const stmtDefaultFrom = (()=>{ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,10); })();
  const stmtOptions = `
    <optgroup label="${t('stmt_group_accounts')}">${state.accounts.filter(a=>a.is_active!==false).map(a=>`<option value="acc:${a.id}">🏦 ${a.account_name}</option>`).join('')}</optgroup>
    <optgroup label="${t('stmt_group_contacts')}">${state.contacts.filter(c=>c.is_active!==false).map(c=>`<option value="con:${c.id}">👤 ${c.contact_name}</option>`).join('')}</optgroup>
  `;

  el.innerHTML = `
    <h2 class="section-title">${t('dash_title')}</h2>
    ${trialBanner}
    <div class="cards-grid compact">
      <div class="stat-card pos"><div class="label">${t('card_income')}</div><div class="value">${fmt(income)}</div></div>
      <div class="stat-card neg"><div class="label">${t('card_expense')}</div><div class="value">${fmt(expense)}</div></div>
      <div class="stat-card pos"><div class="label">${t('card_sale')}</div><div class="value">${fmt(sale)}</div></div>
      <div class="stat-card neg"><div class="label">${t('card_purchase')}</div><div class="value">${fmt(purchase)}</div></div>
      <div class="stat-card pos"><div class="label">${t('card_receivable')}</div><div class="value">${fmt(totalReceivable)}</div></div>
      <div class="stat-card neg"><div class="label">${t('card_payable')}</div><div class="value">${fmt(totalPayable)}</div></div>
    </div>

    <div class="statement-box">
      <h3 class="sub-title" style="margin-top:0;">${t('stmt_title')}</h3>
      <div class="filter-bar">
        <select id="stmtTarget">${stmtOptions}</select>
        <div class="date-row">
          <div><label>${t('stmt_from')}</label><input type="date" id="stmtFrom" value="${stmtDefaultFrom}"></div>
          <div><label>${t('stmt_to')}</label><input type="date" id="stmtTo" value="${stmtDefaultTo}"></div>
        </div>
        <button type="button" class="btn btn-primary" id="stmtViewBtn">${t('stmt_view')}</button>
      </div>
      <div id="stmtResult"></div>
    </div>

    <div class="stat-card gold" style="margin-bottom:14px;"><div class="label">${t('total_balance_label')}</div><div class="value">${fmt(totalCash)}</div></div>
    <h3 class="sub-title" style="margin-top:0;">${t('acc_balance_subtitle')}</h3>
    <div class="entry-list" style="margin-bottom:20px;">
      ${visibleAccounts.length ? visibleAccounts.map(a=>{
        const bal = accountBalance(a.id);
        return `<div class="entry">
          <div><div class="name">${a.account_name}</div><div class="meta">${ACCOUNT_TYPE_LABEL[a.account_type]}</div></div>
          <div class="amt ${bal>=0?'pos':'neg'}">${fmt(bal)}</div>
        </div>`;
      }).join('') : `<div class="empty-state">${t('no_accounts')}</div>`}
    </div>
    ${lowStock.length ? `<div class="stat-card neg" style="margin-bottom:18px;"><div class="label">${t('low_stock')}</div><div class="value" style="font-size:.85rem;">${lowStock.map(p=>p.product_name).join(', ')}</div></div>` : ''}
    <div class="chart-box"><canvas id="trendCanvas"></canvas></div>
  `;

  function runStatement(){
    const val = document.getElementById('stmtTarget').value;
    const from = document.getElementById('stmtFrom').value;
    const to = document.getElementById('stmtTo').value;
    const resultEl = document.getElementById('stmtResult');
    if(!val){ resultEl.innerHTML = `<div class="empty-state">${t('stmt_select_prompt')}</div>`; return; }
    const [kind, id] = val.split(':');
    resultEl.innerHTML = renderStatementHtml(kind, id, from, to);
  }
  document.getElementById('stmtViewBtn').addEventListener('click', runStatement);
  if(stmtOptions.includes('<option')) runStatement();

  const months=[]; for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push(d.toISOString().slice(0,7)); }
  const incomeData = months.map(m=> state.transactions.filter(t=>t.transaction_type==='income'&&t.transaction_date.startsWith(m)).reduce((s,t)=>s+Number(t.total_amount),0));
  const expenseData = months.map(m=> state.transactions.filter(t=>t.transaction_type==='expense'&&t.transaction_date.startsWith(m)).reduce((s,t)=>s+Number(t.total_amount),0));
  const labels = months.map(m=> new Date(m+'-01').toLocaleDateString(state.lang==='en'?'en-US':'bn-BD',{month:'short'}));
  if(window._trendChart) window._trendChart.destroy();
  window._trendChart = new Chart(document.getElementById('trendCanvas').getContext('2d'), {
    type:'bar', data:{ labels, datasets:[ {label:t('card_income'),data:incomeData,backgroundColor:'#1aa251'}, {label:t('card_expense'),data:expenseData,backgroundColor:'#e0342c'} ] },
    options:{ responsive:true, plugins:{legend:{labels:{font:{family:'Hind Siliguri'}}}}, scales:{x:{ticks:{font:{family:'Hind Siliguri'}}},y:{ticks:{font:{family:'Hind Siliguri'}}}} }
  });
}

function txnRow(t){
  const posTypes = ['income','sale','receive_due','payable'];
  const isPos = posTypes.includes(t.transaction_type);
  const acc = state.accounts.find(a=>a.id===t.account_id);
  const contact = state.contacts.find(c=>c.id===t.contact_id);
  let sub = t.transaction_date;
  if(acc) sub += ' · '+acc.account_name;
  if(contact) sub += ' · '+contact.contact_name;
  return `
  <div class="entry">
    <div>
      <div class="name">${TXN_TYPE_LABEL[t.transaction_type]||t.transaction_type}${t.notes?' — '+t.notes:''}</div>
      <div class="meta">${sub}</div>
      <span class="badge ${t.transaction_type}">${TXN_TYPE_LABEL[t.transaction_type]}</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px;">
      <div class="amt ${isPos?'pos':'neg'}">${isPos?'+':'−'}${fmt(t.total_amount)}</div>
      <button class="icon-btn" data-id="${t.id}" onclick="editTxn('${t.id}')">✏️</button>
      <button class="icon-btn" data-id="${t.id}" onclick="deleteTxn('${t.id}')">🗑</button>
    </div>
  </div>`;
}

window.editTxn = function(id){
  state.editingTxnId = id; state.contactDetailId = null; state.active = 'transactions';
  renderTabs(); renderMain();
};

window.deleteTxn = async function(id){
  if(!confirm('এই লেনদেনটি ট্র্যাশে সরাতে চান? ৩০ দিন পর এটা স্বয়ংক্রিয়ভাবে স্থায়ীভাবে মুছে যাবে।')) return;
  const nowIso = new Date().toISOString();
  const { data, error } = await sb.from('transactions').update({ deleted_at: nowIso }).eq('id', id).select('*, transaction_items(*)');
  if(!error){
    const idx = state.transactions.findIndex(t=>t.id===id);
    if(idx>-1){ state.transactions.splice(idx,1); }
    state.trash.unshift(data[0]);
    showSaved('ট্র্যাশে সরানো হয়েছে');
    renderMain();
  }
};

      </div>

      <div><label>${t('qa_note')}</label><input type="text" id="qaNote" value="${editing&&editing.notes?editing.notes:''}" placeholder="বিস্তারিত"></div>

async function resolveAccountId(){
  const sel = document.getElementById('qaAccount');
  if(sel.value !== '__new__') return sel.value;
  const name = document.getElementById('newAccName').value.trim();
  if(!name){ alert('নতুন হিসাবের নাম লিখুন'); return null; }
  const type = document.getElementById('newAccType').value;
  const { data, error } = await sb.from('accounts').insert({ user_id: state.user.id, account_name:name, account_type:type, opening_balance:0, current_balance:0 }).select();
  if(error){ alert('হিসাব তৈরি করতে সমস্যা হয়েছে: '+error.message); return null; }
  state.accounts.push(data[0]);
  showSaved('নতুন হিসাব তৈরি হয়েছে');
  return data[0].id;
}

async function quickAddSubmit(type, needsContact, el, noteTag){
  const amount = parseFloat(document.getElementById('qaAmount').value);
  if(!amount || amount<=0){ alert('পরিমাণ লিখুন'); return; }
  const contactId = document.getElementById('qaParty').value;
  if(needsContact && !contactId){ alert('এই এন্ট্রির জন্য একটি পার্টি নির্বাচন করুন'); return; }
  const accountId = await resolveAccountId();
  if(!accountId) return;
  const date = document.getElementById('qaDate').value || todayStr();
  let note = document.getElementById('qaNote').value || '';
  if(noteTag) note = `[${noteTag}]` + (note ? ' '+note : '');
  note = note || null;
  const fullyPaid = document.getElementById('qaPaid').checked;

  let paid = amount, due = 0;
  if(['sale','purchase'].includes(type)){
    paid = fullyPaid ? amount : 0;
    due = amount - paid;
  }
  const payload = {
    user_id: state.user.id, transaction_no: genTxnNo(), transaction_date: date, transaction_type: type,
    status:'completed', account_id: accountId, contact_id: contactId || null,
    total_amount: amount, paid_amount: paid, due_amount: due, notes: note,
  };
  const { data, error } = await sb.from('transactions').insert(payload).select();
  if(error){ alert('সমস্যা হয়েছে: '+error.message); return; }
  const newTxn = data[0]; newTxn.transaction_items = [];
  state.transactions.unshift(newTxn);
  showSaved();
  renderTransactions(el);
}

async function updateTxnSubmit(editing, el){
  const amount = parseFloat(document.getElementById('qaAmount').value);
  if(!amount || amount<=0){ alert('পরিমাণ লিখুন'); return; }
  const accountId = await resolveAccountId();
  if(!accountId) return;
  const contactId = document.getElementById('qaParty').value || null;
  const date = document.getElementById('qaDate').value || todayStr();
  const note = document.getElementById('qaNote').value || null;
  const fullyPaid = document.getElementById('qaPaid').checked;
  let paid = amount, due = 0;
  if(['sale','purchase'].includes(editing.transaction_type)){ paid = fullyPaid ? amount : 0; due = amount - paid; }
  else { paid = amount; due = 0; }
  const payload = { transaction_date: date, account_id: accountId, contact_id: contactId, total_amount: amount, paid_amount: paid, due_amount: due, notes: note };
  const { data, error } = await sb.from('transactions').update(payload).eq('id', editing.id).select();
  if(error){ alert('সমস্যা হয়েছে: '+error.message); return; }
  const idx = state.transactions.findIndex(t=>t.id===editing.id);
  data[0].transaction_items = editing.transaction_items || [];
  if(idx>-1) state.transactions[idx] = data[0];
  state.editingTxnId = null;
  showSaved('আপডেট হয়েছে');
  renderTransactions(el);
}

// ================= TRASH =================
function renderTrash(el){
  el.innerHTML = `
    <button class="back-btn" id="trashBack">← লেনদেনে ফিরুন</button>
    <h2 class="section-title">🗑 ট্র্যাশ</h2>
    <p style="font-size:.78rem; color:var(--ink-soft); margin:-8px 0 16px;">এখানে থাকা এন্ট্রিগুলো ৩০ দিন পর স্বয়ংক্রিয়ভাবে স্থায়ীভাবে মুছে যাবে।</p>
    <div class="entry-list" id="trashList"></div>
  `;
  document.getElementById('trashBack').addEventListener('click', ()=> renderTransactions(el));
  const list = document.getElementById('trashList');
  list.innerHTML = state.trash.length ? state.trash.map(t=>{
    const daysLeft = Math.max(0, 30 - Math.floor((Date.now()-new Date(t.deleted_at).getTime())/(24*60*60*1000)));
    return `
    <div class="entry">
      <div>
        <div class="name">${TXN_TYPE_LABEL[t.transaction_type]||t.transaction_type}${t.notes?' — '+t.notes:''}</div>
        <div class="meta">${t.transaction_date} · ${daysLeft} দিন পর স্থায়ীভাবে মুছবে</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <div class="amt">${fmt(t.total_amount)}</div>
        <button class="icon-btn" onclick="restoreTxn('${t.id}')" title="পুনরুদ্ধার">↩️</button>
        <button class="icon-btn" onclick="purgeTxnNow('${t.id}')" title="স্থায়ীভাবে মুছুন">❌</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">ট্র্যাশ খালি</div>`;
}

window.restoreTxn = async function(id){
  const { data, error } = await sb.from('transactions').update({ deleted_at: null }).eq('id', id).select('*, transaction_items(*)');
  if(!error){
    const idx = state.trash.findIndex(t=>t.id===id);
    if(idx>-1) state.trash.splice(idx,1);
    state.transactions.unshift(data[0]);
    showSaved('পুনরুদ্ধার হয়েছে');
    renderTrash(document.getElementById('main-content'));
  }
};
window.purgeTxnNow = async function(id){
  if(!confirm('এটা এখনই স্থায়ীভাবে মুছে ফেলতে চান? এটা আর ফেরত আনা যাবে না।')) return;
  await sb.from('transaction_items').delete().eq('transaction_id', id);
  const { error } = await sb.from('transactions').delete().eq('id', id);
  if(!error){
    state.trash = state.trash.filter(t=>t.id!==id);
    showSaved('স্থায়ীভাবে মুছে ফেলা হয়েছে');
    renderTrash(document.getElementById('main-content'));
  }
};

    <h2 class="section-title">রিপোর্ট</h2>
    <div class="filter-bar">
      <select id="repType"><option value="">সব ধরনের লেনদেন</option>${Object.keys(TXN_TYPE_LABEL).map(k=>`<option value="${k}">${TXN_TYPE_LABEL[k]}</option>`).join('')}</select>
      <input type="date" id="repFrom">
      <input type="date" id="repTo">
    </div>
    <div class="cards-grid" id="repCards"></div>
    <div class="chart-box"><canvas id="repChart"></canvas></div>
    <h3 class="sub-title">বিস্তারিত তালিকা</h3>
    <div class="entry-list" id="repList"></div>
  `;
  function applyFilter(){
    const type = document.getElementById('repType').value;
    const from = document.getElementById('repFrom').value;
    const to = document.getElementById('repTo').value;
    let rows = state.transactions;
    if(type) rows = rows.filter(t=>t.transaction_type===type);
    if(from) rows = rows.filter(t=>t.transaction_date >= from);
    if(to) rows = rows.filter(t=>t.transaction_date <= to);

    const totals = {};
    rows.forEach(t=>{ totals[t.transaction_type] = (totals[t.transaction_type]||0) + Number(t.total_amount); });
    document.getElementById('repCards').innerHTML = Object.keys(totals).length ? Object.keys(totals).map(k=>{
      const isPos = ['income','sale','receive_due','payable'].includes(k);
      return `<div class="stat-card ${isPos?'pos':'neg'}"><div class="label">${TXN_TYPE_LABEL[k]}</div><div class="value">${fmt(totals[k])}</div></div>`;
    }).join('') : `<div class="empty-state">এই ফিল্টারে কোনো ডেটা নেই</div>`;

    document.getElementById('repList').innerHTML = rows.length ? rows.map(t=>txnRow(t)).join('') : `<div class="empty-state">কোনো লেনদেন পাওয়া যায়নি</div>`;

    if(window._repChart) window._repChart.destroy();
    const labels = Object.keys(totals).map(k=>TXN_TYPE_LABEL[k]);
    const values = Object.values(totals);
    window._repChart = new Chart(document.getElementById('repChart').getContext('2d'), {
      type:'bar', data:{ labels, datasets:[{ label:'পরিমাণ', data:values, backgroundColor:'#f5a900' }] },
      options:{ responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{family:'Hind Siliguri'}}},y:{ticks:{font:{family:'Hind Siliguri'}}}} }
    });
  }
  el.querySelector('#repType').addEventListener('change', applyFilter);
  el.querySelector('#repFrom').addEventListener('change', applyFilter);
  el.querySelector('#repTo').addEventListener('change', applyFilter);
  applyFilter();
}

// ================= CONTACT LEDGER (party detail) =================
function renderContactDetail(el, contactId){
  const c = state.contacts.find(x=>x.id===contactId);
  if(!c){ state.contactDetailId=null; renderContacts(el); return; }
  const rows = state.transactions
    .filter(t=>t.contact_id===contactId)
    .slice()
    .sort((a,b)=> new Date(a.transaction_date+'T'+(a.created_at?a.created_at.slice(11,19):'00:00:00')) - new Date(b.transaction_date+'T'+(b.created_at?b.created_at.slice(11,19):'00:00:00')));
  let running = Number(c.opening_balance)||0;
  const ledgerRows = rows.map(t=>{
    const total = Number(t.total_amount)||0, due = t.due_amount!=null?Number(t.due_amount):0;
    let dr=0, cr=0;
    if(t.transaction_type==='sale'){ dr = due; }
    else if(t.transaction_type==='purchase'){ cr = due; }
    else if(t.transaction_type==='receivable'){ dr = total; }
    else if(t.transaction_type==='payable'){ cr = total; }
    else if(t.transaction_type==='receive_due'){ cr = total; }
    else if(t.transaction_type==='pay_due'){ dr = total; }
    running += dr - cr;
    return { t, dr, cr, bal: running };
  }).reverse(); // show most recent first
  const net = contactBalance(contactId);

  el.innerHTML = `
    <button class="back-btn" id="ctBack">← পার্টি তালিকায় ফিরুন</button>
    <div class="ledger-header">
      <div class="name">${c.contact_name}${c.phone?'<div style="font-size:.72rem; font-weight:400; opacity:.8;">'+c.phone+'</div>':''}</div>
      <div class="net">
        <div class="amt-big">${fmt(Math.abs(net))}</div>
        <div class="lbl">${net>=0? 'আপনি পাবেন':'আপনি দেবেন'}</div>
      </div>
    </div>
    <div class="ledger-col-heads"><div>বিবরণ</div><div style="text-align:center;">দিলাম (Dr)</div><div style="text-align:center;">পেলাম (Cr)</div></div>
    <div id="ledgerRows"></div>
    <div class="ledger-actions">
      <button class="btn btn-give" id="btnGive">↑ আমি দিলাম</button>
      <button class="btn btn-receive" id="btnReceive">↓ আমি পেলাম</button>
    </div>
  `;
  document.getElementById('ctBack').addEventListener('click', ()=>{ state.contactDetailId=null; renderMain(); });
  const rowsEl = document.getElementById('ledgerRows');
  rowsEl.innerHTML = ledgerRows.length ? ledgerRows.map(r=>`
    <div class="ledger-row">
      <div><div class="ld-date">${r.t.transaction_date}</div><div class="ld-type">${TXN_TYPE_LABEL[r.t.transaction_type]}${r.t.notes?' · '+r.t.notes:''}</div></div>
      <div class="ld-dr">${r.dr? fmt(r.dr):'—'}</div>
      <div class="ld-cr">${r.cr? fmt(r.cr):'—'}</div>
    </div>
    <div style="text-align:right; font-size:.68rem; color:var(--ink-soft); padding:0 6px 8px;">ব্যালেন্স: ${fmt(Math.abs(r.bal))} ${r.bal>=0?'(পাবো)':'(দেবো)'}</div>
  `).join('') : `<div class="empty-state">এখনো কোনো এন্ট্রি নেই — নিচের বাটন দিয়ে যোগ করুন</div>`;

  document.getElementById('btnGive').addEventListener('click', ()=> quickPartyEntry(contactId, 'receivable', el));
  document.getElementById('btnReceive').addEventListener('click', ()=> quickPartyEntry(contactId, 'payable', el));
}

async function quickPartyEntry(contactId, type, el){
  const amtStr = prompt(type==='receivable' ? 'কত টাকা দিলেন?' : 'কত টাকা পেলেন?');
  if(!amtStr) return;
  const amount = parseFloat(amtStr);
  if(!amount || amount<=0) return;
  const defaultAccount = state.accounts.find(a=>a.is_active!==false);
  const payload = {
    user_id: state.user.id, transaction_no: genTxnNo(), transaction_date: todayStr(), transaction_type: type,
    status:'completed', account_id: defaultAccount ? defaultAccount.id : null, contact_id: contactId,
    total_amount: amount, paid_amount: amount, due_amount: 0,
  };
  const { data, error } = await sb.from('transactions').insert(payload).select();
  if(error){ alert('সমস্যা হয়েছে: '+error.message); return; }
  const newTxn = data[0]; newTxn.transaction_items=[];
  state.transactions.unshift(newTxn);
  showSaved();
  renderContactDetail(el, contactId);
}

// ================= PRODUCTS TAB =================
function renderProducts(el){
  const editingProd = state.editingProductId ? state.products.find(p=>p.id===state.editingProductId) : null;
  const activeProducts = state.products.filter(p=>p.is_active!==false);
  const inactiveProducts = state.products.filter(p=>p.is_active===false);
  el.innerHTML = `
    <h2 class="section-title">${editingProd?'✏️ পণ্য সম্পাদনা':'পণ্য'}</h2>
    <form class="entry-form" id="prodForm">
      <div><label>পণ্যের নাম</label><input type="text" name="product_name" required value="${editingProd?editingProd.product_name:''}" placeholder="যেমন: বাটন, জিপার, ভেলক্রো"></div>
      <div class="row2">
        <div><label>একক</label><input type="text" name="unit" placeholder="pcs / kg / gross" value="${editingProd?(editingProd.unit||'pcs'):'pcs'}"></div>
        <div><label>শুরুর স্টক</label><input type="number" step="0.01" name="opening_stock" value="${editingProd?editingProd.opening_stock:''}" placeholder="0"></div>
      </div>
      <div class="row2">
        <div><label>ক্রয় মূল্য (৳)</label><input type="number" step="0.01" name="purchase_price" value="${editingProd?editingProd.purchase_price:''}" placeholder="0.00"></div>
        <div><label>বিক্রয় মূল্য (৳)</label><input type="number" step="0.01" name="sales_price" value="${editingProd?editingProd.sales_price:''}" placeholder="0.00"></div>
      </div>
      <div><label>ন্যূনতম স্টক (স্টক এলার্টের জন্য)</label><input type="number" step="0.01" name="minimum_stock" value="${editingProd?editingProd.minimum_stock:''}" placeholder="0"></div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" type="submit" style="flex:1;">${editingProd?'আপডেট করুন':'পণ্য যোগ করুন'}</button>
        ${editingProd?`<button class="btn btn-outline" type="button" id="prodCancelBtn" style="flex:1;">বাতিল</button>`:''}
      </div>
    </form>
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--line); padding-bottom:10px; margin-bottom:14px;">
      <h2 class="section-title" style="border:none; margin:0; padding:0;">সব পণ্য</h2>
      <button class="btn btn-outline" id="prodTrashBtn" style="padding:7px 13px; font-size:.75rem;">🗑 নিষ্ক্রিয় (${inactiveProducts.length})</button>
    </div>
    <div class="entry-list" id="prodList"></div>
  `;
  el.querySelector('#prodForm').addEventListener('submit', async (e)=>{
    e.preventDefault(); const fd = new FormData(e.target);
    const os = parseFloat(fd.get('opening_stock'))||0;
    if(editingProd){
      const payload = { product_name: fd.get('product_name'), unit: fd.get('unit')||'pcs', opening_stock: os,
        purchase_price: parseFloat(fd.get('purchase_price'))||0, sales_price: parseFloat(fd.get('sales_price'))||0,
        minimum_stock: parseFloat(fd.get('minimum_stock'))||0 };
      const { data, error } = await sb.from('products').update(payload).eq('id', editingProd.id).select();
      if(!error){ const idx=state.products.findIndex(p=>p.id===editingProd.id); state.products[idx]=data[0]; state.editingProductId=null; showSaved('আপডেট হয়েছে'); renderProducts(el); }
      else alert('সমস্যা হয়েছে: '+error.message);
    } else {
      const payload = { user_id: state.user.id, product_name: fd.get('product_name'), unit: fd.get('unit')||'pcs',
        opening_stock: os, current_stock: os, purchase_price: parseFloat(fd.get('purchase_price'))||0,
        sales_price: parseFloat(fd.get('sales_price'))||0, minimum_stock: parseFloat(fd.get('minimum_stock'))||0 };
      const { data, error } = await sb.from('products').insert(payload).select();
      if(!error){ state.products.push(data[0]); e.target.reset(); showSaved(); renderProducts(el); }
    }
  });
  if(editingProd){ document.getElementById('prodCancelBtn').addEventListener('click', ()=>{ state.editingProductId=null; renderProducts(el); }); }
  document.getElementById('prodTrashBtn').addEventListener('click', ()=> renderProductTrash(el));

  const list = el.querySelector('#prodList');
  list.innerHTML = activeProducts.length ? activeProducts.map(p=>{
    const stock = productStock(p.id);
    const low = Number(p.minimum_stock)>0 && stock<=Number(p.minimum_stock);
    return `<div class="entry">
      <div><div class="name">${p.product_name}</div><div class="meta">ক্রয়: ${fmt(p.purchase_price)} · বিক্রয়: ${fmt(p.sales_price)}</div></div>
      <div style="display:flex; align-items:center; gap:6px;">
        <div class="amt ${low?'neg':'pos'}">${stock} ${p.unit||''}</div>
        <button class="icon-btn" onclick="editProduct('${p.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteProduct('${p.id}')">🗑</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">এখনো কোনো পণ্য নেই</div>`;
}

window.editProduct = function(id){ state.editingProductId = id; renderMain(); };
window.deleteProduct = async function(id){
  if(!confirm('এই পণ্যটি নিষ্ক্রিয় করতে চান? পরে চাইলে ফিরিয়ে আনতে পারবেন।')) return;
  const { data, error } = await sb.from('products').update({ is_active:false }).eq('id', id).select();
  if(!error){ const idx=state.products.findIndex(p=>p.id===id); state.products[idx]=data[0]; showSaved('নিষ্ক্রিয় করা হয়েছে'); renderMain(); }
};
function renderProductTrash(el){
  const inactive = state.products.filter(p=>p.is_active===false);
  el.innerHTML = `
    <button class="back-btn" id="prodTrashBack">← পণ্যে ফিরুন</button>
    <h2 class="section-title">🗑 নিষ্ক্রিয় পণ্য</h2>
    <div class="entry-list" id="prodTrashList"></div>
  `;
  document.getElementById('prodTrashBack').addEventListener('click', ()=> renderProducts(el));
  document.getElementById('prodTrashList').innerHTML = inactive.length ? inactive.map(p=>`
    <div class="entry">
      <div><div class="name">${p.product_name}</div><div class="meta">ক্রয়: ${fmt(p.purchase_price)} · বিক্রয়: ${fmt(p.sales_price)}</div></div>
      <div style="display:flex; gap:6px;">
        <button class="icon-btn" onclick="restoreProduct('${p.id}')" title="পুনরুদ্ধার">↩️</button>
        <button class="icon-btn" onclick="permanentDeleteProduct('${p.id}')" title="স্থায়ীভাবে মুছুন">❌</button>
      </div>
    </div>`).join('') : `<div class="empty-state">কোনো নিষ্ক্রিয় পণ্য নেই</div>`;
}
window.restoreProduct = async function(id){
  const { data, error } = await sb.from('products').update({ is_active:true }).eq('id', id).select();
  if(!error){ const idx=state.products.findIndex(p=>p.id===id); state.products[idx]=data[0]; showSaved('পুনরুদ্ধার হয়েছে'); renderMain(); }
};
window.permanentDeleteProduct = async function(id){
  if(!confirm('এই পণ্যটি স্থায়ীভাবে মুছে ফেলতে চান?')) return;
  const { error } = await sb.from('products').delete().eq('id', id);
  if(error){ alert('মুছা যায়নি: '+error.message); return; }
  state.products = state.products.filter(p=>p.id!==id);
  showSaved('স্থায়ীভাবে মুছে ফেলা হয়েছে');
  renderMain();
};

// ================= ADMIN =================
async function renderAdmin(el){
  el.innerHTML = `<div class="loading">লোড হচ্ছে...</div>`;
  const { data, error } = await sb.from('profiles').select('*').order('created_at',{ascending:false});
  if(error){ el.innerHTML = `<div class="empty-state">লোড করতে সমস্যা: ${error.message}</div>`; return; }
  state.allProfiles = data || [];
  renderAdminList(el);
}
function renderAdminList(el){
  const now = Date.now();
  const cfg = state.appConfig || {};
  const sortedProfiles = state.allProfiles.slice().sort((a,b)=>{
    if(a.is_admin !== b.is_admin) return a.is_admin ? 1 : -1;
    const at = a.last_active_at ? new Date(a.last_active_at).getTime() : 0;
    const bt = b.last_active_at ? new Date(b.last_active_at).getTime() : 0;
    return at - bt; // most inactive (oldest / never active) first
  });
  el.innerHTML = `
    <h2 class="section-title">👑 অ্যাডমিন — সব ইউজার</h2>
    <form class="entry-form" id="configForm">
      <h3 class="sub-title" style="margin-top:0;">মেয়াদ-শেষ স্ক্রিনে দেখানো যোগাযোগ/পেমেন্ট তথ্য</h3>
      <div><label>ফোন নাম্বার</label><input type="text" name="contact_phone" value="${cfg.contact_phone||''}" placeholder="01xxxxxxxxx"></div>
      <div><label>হোয়াটসঅ্যাপ নাম্বার</label><input type="text" name="contact_whatsapp" value="${cfg.contact_whatsapp||''}" placeholder="8801xxxxxxxxx"></div>
      <div><label>ইমেইল</label><input type="email" name="contact_email" value="${cfg.contact_email||''}" placeholder="you@example.com"></div>
      <div><label>পেমেন্ট নির্দেশনা</label><textarea name="payment_instructions" placeholder="যেমন: বিকাশে ০১xxxxxxxxx নাম্বারে সেন্ড মানি করে স্ক্রিনশট পাঠান">${cfg.payment_instructions||''}</textarea></div>
      <button class="btn btn-primary" type="submit">সংরক্ষণ করুন</button>
    </form>
    <p style="font-size:.78rem; color:var(--ink-soft); margin:16px 0;">মোট ইউজার: ${state.allProfiles.length} · সবচেয়ে বেশিদিন নিষ্ক্রিয় ইউজার আগে দেখানো হচ্ছে</p>
    <div class="entry-list" id="adminList"></div>
  `;
  document.getElementById('configForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {
      contact_phone: fd.get('contact_phone')||null,
      contact_whatsapp: fd.get('contact_whatsapp')||null,
      contact_email: fd.get('contact_email')||null,
      payment_instructions: fd.get('payment_instructions')||null,
      updated_at: new Date().toISOString(),
    };
    const { data, error } = await sb.from('app_config').update(payload).eq('id',1).select().maybeSingle();
    if(error){ alert('সমস্যা হয়েছে: '+error.message); return; }
    state.appConfig = data;
    showSaved('তথ্য সংরক্ষণ হয়েছে');
  });
  const list = document.getElementById('adminList');
  list.innerHTML = sortedProfiles.map(p=>{
    let statusLabel, statusColor;
    if(p.is_admin){ statusLabel='অ্যাডমিন'; statusColor='gold'; }
    else if(!p.access_expires_at){ statusLabel='আজীবন'; statusColor='pos'; }
    else if(new Date(p.access_expires_at).getTime() < now){ statusLabel='মেয়াদ শেষ'; statusColor='neg'; }
    else { statusLabel='সক্রিয়'; statusColor='pos'; }
    const expiryStr = p.access_expires_at ? new Date(p.access_expires_at).toLocaleDateString('bn-BD',{year:'numeric',month:'short',day:'numeric'}) : '—';

    let activityBadge = '';
    if(!p.is_admin){
      if(!p.last_active_at){
        activityBadge = `<span class="badge expense">কখনো সক্রিয় হয়নি</span>`;
      } else {
        const daysAgo = Math.floor((now - new Date(p.last_active_at).getTime()) / 86400000);
        const label = daysAgo<=0 ? 'আজ সক্রিয়' : daysAgo+' দিন আগে সক্রিয় ছিল';
        const cls = daysAgo>=30 ? 'expense' : daysAgo>=7 ? 'pay_due' : 'income';
        activityBadge = `<span class="badge ${cls}">${label}</span>`;
      }
    }
    const emailBtn = (!p.is_admin && p.email) ? `<a class="btn btn-outline" style="flex:1; min-width:120px; font-size:.72rem; padding:8px; text-align:center;" href="mailto:${p.email}?subject=${encodeURIComponent('আপনাকে মিস করছি — হিসাবের খাতা')}&body=${encodeURIComponent('আসসালামু আলাইকুম '+(p.full_name||'')+',\n\nঅনেকদিন ধরে আপনি হিসাবের খাতা অ্যাপে ঢুকছেন না। কোনো সমস্যা হচ্ছে কি? সাহায্য লাগলে জানান, আমরা পাশে আছি।\n\nধন্যবাদ')}">✉️ ইমেইল পাঠান</a>` : '';

    return `
    <div class="entry" style="flex-direction:column; align-items:stretch; gap:8px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div class="name">${p.full_name || '(নাম নেই)'}</div>
          <div class="meta">${p.email||''}</div>
          <div class="meta">সাইনআপ: ${new Date(p.created_at).toLocaleDateString('bn-BD')}</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
          <span class="badge ${statusColor==='gold'?'pay_due':statusColor==='pos'?'income':'expense'}">${statusLabel}${p.access_expires_at && !p.is_admin ? ' · '+expiryStr : ''}</span>
          ${activityBadge}
        </div>
      </div>
      ${p.is_admin ? '' : `
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="btn btn-outline" style="flex:1; min-width:80px; font-size:.72rem; padding:8px;" onclick="extendAccess('${p.id}',30)">+১ মাস</button>
        <button class="btn btn-outline" style="flex:1; min-width:80px; font-size:.72rem; padding:8px;" onclick="extendAccess('${p.id}',365)">+১ বছর</button>
        <button class="btn btn-outline" style="flex:1; min-width:80px; font-size:.72rem; padding:8px;" onclick="extendAccess('${p.id}',1825)">৫ বছর দিন</button>
        <button class="btn btn-outline" style="flex:1; min-width:80px; font-size:.72rem; padding:8px;" onclick="setLifetime('${p.id}')">আজীবন</button>
        <button class="btn btn-outline" style="flex:1; min-width:80px; font-size:.72rem; padding:8px; color:var(--maroon);" onclick="revokeAccess('${p.id}')">এখনই বন্ধ করুন</button>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="date" id="dateFor_${p.id}" style="flex:1;" value="${p.access_expires_at ? new Date(p.access_expires_at).toISOString().slice(0,10) : ''}">
        <button class="btn btn-primary" style="font-size:.78rem; padding:9px 14px;" onclick="setCustomDate('${p.id}')">সেট করুন</button>
      </div>
      <button class="btn ${p.can_post?'btn-primary':'btn-outline'}" style="font-size:.75rem; padding:9px;" onclick="togglePostAccess('${p.id}', ${!!p.can_post})">📝 ব্লগে পোস্ট করার অনুমতি: ${p.can_post?'চালু আছে (বন্ধ করুন)':'বন্ধ আছে (চালু করুন)'}</button>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">${emailBtn}</div>
      `}
    </div>`;
  }).join('');
}
async function updateUserExpiry(userId, newDateIso){
  const { data, error } = await sb.from('profiles').update({ access_expires_at: newDateIso }).eq('id', userId).select();
  if(error){ alert('আপডেট করতে সমস্যা হয়েছে: '+error.message); return; }
  const idx = state.allProfiles.findIndex(p=>p.id===userId);
  if(idx>-1) state.allProfiles[idx] = data[0];
  showSaved('আপডেট হয়েছে');
  renderAdminList(document.getElementById('main-content'));
}
window.extendAccess = function(userId, days){
  const p = state.allProfiles.find(x=>x.id===userId);
  const base = (p && p.access_expires_at && new Date(p.access_expires_at).getTime()>Date.now()) ? new Date(p.access_expires_at) : new Date();
  base.setDate(base.getDate()+days);
  updateUserExpiry(userId, base.toISOString());
};
window.setLifetime = function(userId){
  if(!confirm('এই ইউজারকে আজীবন (কখনো মেয়াদ শেষ হবে না) অ্যাক্সেস দিতে চান?')) return;
  updateUserExpiry(userId, null);
};
window.revokeAccess = function(userId){
  if(!confirm('এই ইউজারের অ্যাক্সেস এখনই বন্ধ করতে চান?')) return;
  updateUserExpiry(userId, new Date(Date.now()-1000).toISOString());
};
window.setCustomDate = function(userId){
  const val = document.getElementById('dateFor_'+userId).value;
  if(!val){ alert('একটা তারিখ বাছাই করুন'); return; }
  updateUserExpiry(userId, new Date(val+'T23:59:59').toISOString());
};

window.togglePostAccess = async function(userId, current){
  const { data, error } = await sb.from('profiles').update({ can_post: !current }).eq('id', userId).select();
  if(error){ alert('সমস্যা হয়েছে: '+error.message); return; }
  const idx = state.allProfiles.findIndex(p=>p.id===userId);
  if(idx>-1) state.allProfiles[idx] = data[0];
  showSaved('আপডেট হয়েছে');
  renderAdminList(document.getElementById('main-content'));
};

sb.auth.getSession().then(({data})=>{
  if(!data.session){ document.getElementById('authScreen').style.display='flex'; }
});
</script>
</body>
